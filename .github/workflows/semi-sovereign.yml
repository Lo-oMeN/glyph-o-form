name: 🤖 Semi-Sovereign CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run full tests every hour
    - cron: '0 * * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
        browser: [chromium, firefox]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install playwright pytest pytest-asyncio
        npm install -g http-server
    
    - name: Install Playwright browsers
      run: playwright install ${{ matrix.browser }}
    
    - name: Start test server
      run: |
        http-server app -p 8080 &
        sleep 3
    
    - name: Run smoke tests
      run: |
        python3 semi_sovereign_agent.py --run-once
    
    - name: Run full test suite
      run: |
        python3 -c "
import asyncio
import sys
sys.path.insert(0, '.')
from semi_sovereign_agent import SemiSovereignAgent

async def main():
    agent = SemiSovereignAgent()
    results = await agent._run_full_test_suite()
    report = agent._generate_report(results)
    
    # Save report
    import json
    with open('test-report.json', 'w') as f:
        json.dump(report, f, indent=2)
    
    # Exit with error if tests failed
    if not results['passed']:
        print('❌ Tests failed')
        sys.exit(1)
    else:
        print('✅ All tests passed')

asyncio.run(main())
        "
    
    - name: Upload test report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-report-${{ matrix.browser }}-node${{ matrix.node-version }}
        path: test-report.json
    
    - name: Upload screenshots
      uses: actions/upload-artifact@v3
      if: failure()
      with:
        name: failure-screenshots
        path: app/test-screenshots/

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20
    
    - name: Install Lighthouse
      run: npm install -g lighthouse http-server
    
    - name: Start server
      run: |
        http-server app -p 8080 &
        sleep 3
    
    - name: Run Lighthouse CI
      run: |
        lighthouse http://localhost:8080 \
          --chrome-flags="--headless --no-sandbox" \
          --output=json \
          --output-path=./lighthouse-report.json
    
    - name: Check performance budget
      run: |
        python3 -c "
import json

with open('lighthouse-report.json', 'r') as f:
    report = json.load(f)

scores = report['categories']
perf = scores['performance']['score'] * 100
accessibility = scores['accessibility']['score'] * 100
best_practices = scores['best-practices']['score'] * 100
seo = scores['seo']['score'] * 100

print(f'Performance: {perf}')
print(f'Accessibility: {accessibility}')
print(f'Best Practices: {best_practices}')
print(f'SEO: {seo}')

if perf < 90:
    print('❌ Performance score below 90')
    exit(1)
if accessibility < 95:
    print('❌ Accessibility score below 95')
    exit(1)

print('✅ All Lighthouse checks passed')
        "
    
    - name: Upload Lighthouse report
      uses: actions/upload-artifact@v3
      with:
        name: lighthouse-report
        path: lighthouse-report.json

  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: 'security-scan.sarif'
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: master
        head: HEAD

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, performance]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to staging
      run: |
        echo "Deploying to staging..."
        # Add your staging deployment here
        # e.g., rsync, scp, or cloud provider CLI
        
    - name: Notify success
      run: |
        echo "✅ Deployed to staging"
        # Send notification to Telegram, Slack, etc.

  notify:
    runs-on: ubuntu-latest
    needs: [test, performance, security]
    if: always()
    
    steps:
    - name: Send Telegram notification
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🤖 Semi-Sovereign Agent Report
          
          Tests: ${{ needs.test.result }}
          Performance: ${{ needs.performance.result }}
          Security: ${{ needs.security.result }}
          
          Commit: ${{ github.sha }}
          Branch: ${{ github.ref }}
